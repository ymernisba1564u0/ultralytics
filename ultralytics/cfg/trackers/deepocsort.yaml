# Deep OC-SORT tracker defaults for mode="track"
# Docs: https://docs.ultralytics.com/modes/track/

tracker_type: deepocsort # (str) Tracker backend: Deep OC-SORT with appearance features and GMC
track_high_thresh: 0.3 # (float) First-stage match threshold; raise for cleaner tracks, lower to keep more
track_low_thresh: 0.1 # (float) Second-stage threshold for low-score matches; used with use_byte=True
new_track_thresh: 0.3 # (float) Start a new track if no match ≥ this; higher reduces false tracks
track_buffer: 50 # (int) Frames to keep lost tracks alive; increased for better occlusion handling in crowded scenes
match_thresh: 0.8 # (float) Association similarity threshold (IoU/cost); tune with detector quality
fuse_score: True # (bool) Fuse detection score with motion/IoU for matching; stabilizes weak detections

# OC-SORT specifics (inherited)
delta_t: 3 # (int) Temporal window for velocity direction computation in OCM
inertia: 0.0 # (float) Disabled: velocity cost may add noise with strong detector
use_byte: True # (bool) Enable ByteTrack-style low-confidence second association pass

# Deep OC-SORT specifics
gmc_method: none # (str) Global motion compensation: sparseOptFlow|orb|sift|ecc|none; use 'none' with XYAH state
with_reid: True # (bool) Enable ReID model use; needs extra model and compute
model: yolo26n-reid.pt # (str) ReID model name/path; "auto" uses detector features if available
proximity_thresh: 0.5 # (float) Min IoU to consider tracks proximate for ReID; higher is stricter
appearance_thresh: 0.9 # (float) Min appearance similarity for ReID; raise to avoid identity swaps
alpha_fixed_emb: 0.95 # (float) Base EMA factor for track embedding updates; higher = slower update
